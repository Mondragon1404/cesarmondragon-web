<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página no encontrada — César Mondragón</title>
    <meta name="robots" content="noindex, follow">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --black: #0A0A0A; --white: #FFFFFF; --red: #A61C1C; --gray: #888888; --border: #1e1e1e; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 24px 48px;
            border-bottom: 1px solid var(--border);
        }

        .nav-logo {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.03em;
            color: var(--white);
            text-decoration: none;
        }

        .btn-back {
            font-size: 13px;
            color: var(--gray);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }

        .btn-back:hover { color: var(--white); }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 80px 48px;
        }

        .error-code {
            font-size: clamp(96px, 20vw, 200px);
            font-weight: 900;
            letter-spacing: -0.06em;
            line-height: 1;
            color: #1a1a1a;
            margin-bottom: 32px;
            user-select: none;
        }

        .error-title {
            font-size: clamp(24px, 3.5vw, 40px);
            font-weight: 700;
            letter-spacing: -0.03em;
            margin-bottom: 16px;
        }

        .error-desc {
            font-size: 16px;
            color: var(--gray);
            font-weight: 300;
            line-height: 1.7;
            max-width: 400px;
            margin-bottom: 48px;
        }

        .btn-home {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: var(--white);
            color: var(--black);
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.25s, color 0.25s, transform 0.25s;
            letter-spacing: 0.01em;
        }

        .btn-home:hover { background: var(--red); color: var(--white); transform: scale(1.04); }

        footer {
            padding: 24px 48px;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .footer-copy { font-size: 12px; color: var(--gray); }

        @media (max-width: 600px) {
            nav { padding: 20px 24px; }
            main { padding: 60px 24px; }
            footer { padding: 20px 24px; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="nav-logo">CM</a>
        <a href="index.html" class="btn-back">← Volver al inicio</a>
    </nav>

    <main>
        <div class="error-code">404</div>
        <h1 class="error-title">Página no encontrada</h1>
        <p class="error-desc">La página que buscas no existe o ha sido movida. Vuelve al inicio y encontrarás todo lo que necesitas.</p>
        <a href="index.html" class="btn-home">Ir al inicio ↗</a>
    </main>

    <footer>
        <span class="footer-copy">© 2026 César Mondragón</span>
    </footer>
</body>
</html>
